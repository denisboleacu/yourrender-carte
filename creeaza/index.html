<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourRender — Generează link client</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--em:#10b981;--em-soft:#5ee0b5;--bg:#040a08;--card-top:#0c1714;--card-bot:#070f0d;
    --ink:#dde8e3;--ink2:#c3d1cb;--muted:#8aa098;--line:rgba(255,255,255,.07);}
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px 16px;
    font-family:'Inter',-apple-system,system-ui,sans-serif;
    background:radial-gradient(800px 520px at 50% -5%,rgba(16,185,129,.13),transparent 62%),var(--bg);
    -webkit-font-smoothing:antialiased;}
  .card{position:relative;width:100%;max-width:460px;
    background:radial-gradient(460px 320px at 78% -8%,rgba(16,185,129,.14),transparent 60%),linear-gradient(168deg,var(--card-top),var(--card-bot));
    border:1px solid var(--line);border-radius:22px;padding:34px 30px 30px;
    box-shadow:0 30px 80px rgba(0,0,0,.55),0 0 0 1px rgba(16,185,129,.08),0 0 60px rgba(16,185,129,.07);}
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;border-radius:22px 22px 0 0;
    background:linear-gradient(90deg,transparent,var(--em),transparent);}
  h1{font-size:20px;font-weight:800;letter-spacing:-.4px;color:var(--ink);margin-bottom:6px;}
  h1 b{color:var(--em);}
  .desc{font-size:13.5px;color:var(--muted);margin-bottom:22px;line-height:1.5;}
  label{display:block;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--em-soft);margin-bottom:8px;}
  input{width:100%;font-family:inherit;font-size:16px;color:var(--ink);background:#0a1512;
    border:1px solid var(--line);border-radius:12px;padding:14px 16px;outline:none;transition:.2s;}
  input:focus{border-color:var(--em);box-shadow:0 0 0 3px rgba(16,185,129,.15);}
  .preview{margin-top:18px;font-size:15px;color:var(--ink2);}
  .preview b{color:var(--ink);}
  .linkbox{margin-top:14px;display:none;}
  .linkbox.on{display:block;}
  .lk{font-size:13px;color:var(--em-soft);background:#0a1512;border:1px solid var(--line);
    border-radius:10px;padding:12px 14px;word-break:break-all;line-height:1.5;}
  .btns{display:flex;gap:10px;margin-top:14px;}
  .btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;
    font-size:14.5px;font-weight:700;padding:13px 16px;border-radius:11px;border:0;cursor:pointer;transition:.2s;text-decoration:none;}
  .btn.primary{color:#04130d;background:linear-gradient(135deg,var(--em),var(--em-soft));box-shadow:0 10px 24px rgba(16,185,129,.3);}
  .btn.ghost{color:var(--ink);background:transparent;border:1px solid var(--line);}
  .btn:hover{transform:translateY(-1px);}
  .ok{margin-top:10px;font-size:12.5px;color:var(--em);min-height:16px;text-align:center;}
</style>
</head>
<body>
<div class="card">
  <h1>Your<b>Render</b> · link client</h1>
  <div class="desc">Scrie numele clientului (persoană sau firmă). Îți facem un link care, după „Salut", afișează exact numele lui.</div>

  <label for="n">Nume client (persoană sau firmă)</label>
  <input id="n" type="text" placeholder="ex. Ion Popescu  /  Ambianța SRL" autocomplete="off">

  <div class="preview">Va apărea: „<b id="prev">Salut!</b>"</div>

  <div class="linkbox" id="lb">
    <div class="lk" id="lk"></div>
    <div class="btns">
      <button class="btn primary" id="copy">📋 Copiază link</button>
      <a class="btn ghost" id="open" target="_blank">Deschide</a>
    </div>
    <div class="ok" id="ok"></div>
  </div>
</div>

<script>
  var BASE='https://denisboleacu.github.io/yourrender-carte/general/';
  var n=document.getElementById('n'),prev=document.getElementById('prev'),lb=document.getElementById('lb'),
      lk=document.getElementById('lk'),open=document.getElementById('open'),ok=document.getElementById('ok');
  function build(){
    var v=n.value.trim();
    if(!v){prev.textContent='Salut!';lb.classList.remove('on');ok.textContent='';return;}
    prev.textContent='Salut, '+v+'!';
    var url=BASE+'?n='+encodeURIComponent(v);
    lk.textContent=url;open.href=url;lb.classList.add('on');ok.textContent='';
  }
  n.addEventListener('input',build);
  document.getElementById('copy').addEventListener('click',function(){
    navigator.clipboard.writeText(lk.textContent).then(function(){ok.textContent='✓ Link copiat — lipește-l în WhatsApp și trimite';},
      function(){ok.textContent='Apasă lung pe link ca să-l copiezi';});
  });
</script>
</body>
</html>
