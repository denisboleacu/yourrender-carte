<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Kodak × YourQuantix</title>
<meta property="og:title" content="A inventat viitorul — și a murit de frica lui.">
<meta property="og:description" content="Povestea Kodak pe care orice antreprenor ar trebui s-o vadă în 2026. Glisează prin 8 pagini.">
<meta property="og:image" content="https://denisboleacu.github.io/yourrender-carte/kodak-ro/slide-1.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#0a0a0a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;}
.track{display:flex;height:100vh;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;}
.track::-webkit-scrollbar{display:none;}
.page{flex:0 0 100%;height:100vh;scroll-snap-align:center;display:flex;align-items:center;justify-content:center;}
.page img{max-width:100%;max-height:100%;object-fit:contain;display:block;}
.counter{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:10;
  background:rgba(0,0,0,.55);color:#fff;font-size:14px;font-weight:700;letter-spacing:2px;
  padding:6px 14px;border-radius:20px;backdrop-filter:blur(4px);}
.dots{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:7px;}
.dots b{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.32);transition:.25s;}
.dots b.on{background:#E11225;transform:scale(1.3);}
.nav{position:fixed;top:50%;transform:translateY(-50%);z-index:10;width:46px;height:46px;border:none;
  border-radius:50%;background:rgba(0,0,0,.5);color:#fff;font-size:24px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.nav:active{background:rgba(225,18,37,.8);}
.prev{left:14px;}.next{right:14px;}
.nav.hide{opacity:0;pointer-events:none;}
.hint{display:none;}
.wabtn{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:20;
  display:flex;align-items:center;gap:10px;background:#25D366;color:#fff;text-decoration:none;
  font-weight:800;font-size:18px;padding:15px 30px;border-radius:30px;box-shadow:0 6px 24px rgba(0,0,0,.5);
  animation:wapulse 2s ease-in-out infinite;}
@keyframes wapulse{0%,100%{transform:translateX(-50%) scale(1);}50%{transform:translateX(-50%) scale(1.045);}}
.wabtn svg{width:24px;height:24px;fill:#fff;}
@media(min-width:740px){.page img{max-width:auto;height:96vh;}}
@media(max-width:739px){.nav{display:none;}}
</style>
</head>
<body>
<div class="counter"><span id="cur">1</span> / 8</div>
<div class="track" id="track">
  <div class="page"><img src="slide-1.png" alt="1"></div>
  <div class="page"><img src="slide-2.png" alt="2"></div>
  <div class="page"><img src="slide-3.png" alt="3"></div>
  <div class="page"><img src="slide-4.png" alt="4"></div>
  <div class="page"><img src="slide-5.png" alt="5"></div>
  <div class="page"><img src="slide-6.png" alt="6"></div>
  <div class="page"><img src="slide-7.png" alt="7"></div>
  <div class="page"><img src="slide-8.png" alt="8"></div>
</div>
<button class="nav prev" onclick="go(-1)">‹</button>
<button class="nav next" onclick="go(1)">›</button>
<div class="dots" id="dots"></div>
<div class="hint" id="hint">glisează →</div>
<a class="wabtn" id="wa" href="https://wa.me/4555244984" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5-1.3A10 10 0 1 0 12 2zm0 18.2a8.2 8.2 0 0 1-4.2-1.2l-.3-.2-3 .8.8-2.9-.2-.3A8.2 8.2 0 1 1 12 20.2zm4.6-6.1c-.300000000000001-.1-1.5-.7-1.7-.8s-.4-.1-.6.1l-.8 1c-.1.2-.3.2-.5.1a6.7 6.7 0 0 1-3.3-2.9c-.2-.4.2-.3.6-1.1.1-.2 0-.3 0-.5l-.7-1.8c-.2-.5-.4-.4-.6-.4h-.5a1 1 0 0 0-.7.3 3 3 0 0 0-1 2.3c0 1.4 1 2.7 1.1 2.9s2 3.1 4.9 4.3c1.8.7 2.4.8 3.2.7.6-.1 1.5-.6 1.7-1.2s.2-1.1.2-1.2-.2-.2-.5-.4z"/></svg> Scrie-mi pe WhatsApp</a>
<script>
const track=document.getElementById('track'), N=8;
const dots=document.getElementById('dots');
for(let i=0;i<N;i++){const b=document.createElement('b');if(i===0)b.className='on';dots.appendChild(b);}
function cur(){return Math.round(track.scrollLeft/track.clientWidth);}
function paint(){const c=cur();document.getElementById('cur').textContent=c+1;
  [...dots.children].forEach((b,i)=>b.className=i===c?'on':'');
  document.querySelector('.prev').classList.toggle('hide',c===0);
  document.querySelector('.next').classList.toggle('hide',c===N-1);
  const wa=document.getElementById('wa');if(wa)wa.classList.toggle('show',c===N-1);
  if(c>0){const h=document.getElementById('hint');if(h)h.style.display='none';}}
function go(d){track.scrollTo({left:(cur()+d)*track.clientWidth,behavior:'smooth'});}
track.addEventListener('scroll',()=>{clearTimeout(window._t);window._t=setTimeout(paint,60);});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(1);if(e.key==='ArrowLeft')go(-1);});
paint();
</script>
</body>
</html>
