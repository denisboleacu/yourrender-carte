<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Для тебя ❤️</title>
<meta property="og:title" content="Ты моя ляля 🗽❤️">
<meta property="og:description" content="Смотри, это мы с тобой на самом верху Нью-Йорка.">
<meta property="og:image" content="https://denisboleacu.github.io/yourrender-carte/lyalya/foto.png">
<meta name="twitter:card" content="summary_large_image">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#0a0a0f;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow-x:hidden;}
.wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px 14px 40px;}
.photo{max-width:100%;max-height:82vh;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.6);opacity:0;transform:scale(.98);animation:in 1.1s ease forwards;}
@keyframes in{to{opacity:1;transform:scale(1);}}
.cap{margin-top:22px;color:#f6f1e8;text-align:center;opacity:0;animation:in 1.2s ease .5s forwards;}
.cap .big{font-size:26px;font-weight:700;letter-spacing:.3px;}
.cap .sub{font-size:16px;color:#c9c4bb;margin-top:6px;}
.heart{font-size:30px;margin-top:14px;opacity:0;animation:beat 1.4s ease-in-out .9s infinite, in 1s ease .8s forwards;}
@keyframes beat{0%,100%{transform:scale(1);}50%{transform:scale(1.18);}}
</style>
</head>
<body>
<div class="wrap">
  <img class="photo" src="foto.png" alt="Ты моя ляля">
  <div class="cap">
    <div class="big">Ты моя ляля ❤️</div>
    <div class="sub">На самом верху Нью-Йорка — только ты и я.</div>
  </div>
  <div class="heart">❤️</div>
</div>
</body>
</html>
